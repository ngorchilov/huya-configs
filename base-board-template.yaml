substitutions:
  name: base-board-template
  friendly_name: Base Board Template

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

logger:
  level: INFO

api:
  id: hapi

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: Huya-WiFi

mdns:
  disabled: false

captive_portal:

button:
  - platform: restart
    name: MCU Restart
    id: mcu_restart

sensor:
  - platform: uptime
    type: timestamp
    name: Uptime
    id: mcu_uptime
    time_id: ha_time
    device_class: uptime
    entity_category: diagnostic

  - platform: wifi_signal
    name: WiFi Signal
    id: mcu_wifi_signal
    device_class: signal_strength
    unit_of_measurement: dBm
    accuracy_decimals: 0
    state_class: measurement
    entity_category: diagnostic
    disabled_by_default: true
    filters:
      - delta: 1

  - platform: internal_temperature
    name: MCU Temperature
    id: mcu_temperature
    device_class: temperature
    unit_of_measurement: °C
    accuracy_decimals: 0
    state_class: measurement
    entity_category: diagnostic
    disabled_by_default: true
    filters:
      - delta: 1

binary_sensor:
  - platform: status
    name: Status
    id: mcu_status
    device_class: connectivity
    entity_category: diagnostic
    disabled_by_default: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP
      id: mcu_ip
      entity_category: diagnostic
    ssid:
      name: SSID
      id: mcu_ssid
      entity_category: diagnostic
      disabled_by_default: true
    bssid:
      name: BSSID
      id: mcu_bssid
      entity_category: diagnostic
      disabled_by_default: true
    mac_address:
      name: MAC Address
      id: mcu_mac_address
      entity_category: diagnostic
      disabled_by_default: true

  - platform: version
    name: ESPhome Version
    id: mcu_version_esphome
    entity_category: diagnostic
    hide_timestamp: true
    disabled_by_default: true

time:
  - platform: homeassistant
    id: ha_time
